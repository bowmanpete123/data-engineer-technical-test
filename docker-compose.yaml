services:
  core:
    build:
      dockerfile: ./Dockerfile
    tty: true
    volumes:
      - "${PWD}/src:/opt/src/"
    environment:
      - ETL_ENGINE=duckdb
      - ETL_WATCHER=watchdog
      - PG_HOST=postgres
      - PG_DATABASE=analytics
      - PG_USER=postgres
      - PG_PASSWORD=postgres
      - PG_PORT=5432
      - PG_TABLE=bet
      - PG_SCHEMA=raw
      - LANDED_FOLDER=/opt/src/landed_files/*.csv
      - NULL_STR=NULL
      - PYTHONPATH=/opt/src
    command: python3 -m python.main
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:11
    restart: unless-stopped
    volumes:
       - "${PWD}/db-data:/var/lib/postgresql/data"
       - "./init_scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql"
    ports:
      - "54322:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 10
      start_period: 10s
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics
